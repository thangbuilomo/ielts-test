      .map-labelling-group .loose-control {
        grid-template-columns: 1fr;
        gap: 6px;
        align-items: start;
      }
      .map-labelling-group .ex-input,
      .map-labelling-group .ex-select {
        width: 100%;
        min-width: 0;
        max-width: 260px;
      }
      .short-answer-row {
        display: block;
        width: 100%;
        max-width: calc(100vw - 84px);
      }
      .short-answer-row .short-answer-question {
        display: block;
        margin-bottom: 6px;
        max-width: calc(100vw - 84px);
      }
      .short-answer-row .ex-input {
        width: min(100%, 260px);
        max-width: 100%;
      }
      .exercise-practice-page .runner-header { height: auto; padding: 12px 16px; align-items: center; }
      .exercise-practice-page .runner-title-row h2 { max-width: 100%; }
      .listening-exercise-page .runner-container {
        max-width: none;
        margin: 0;
        padding: 16px 16px 72px;
      }
      .listening-exercise-page .audio-player {
        margin-bottom: 14px;
      }
      .listening-exercise-page .question-group {
        margin-bottom: 16px;
      }
      .listening-exercise-page .prompt-content {
        padding: 16px;
      }
      .listening-exercise-page .score-card,
      .reading-exercise-page .score-card {
        padding: 16px 18px;
      }
      
      /* --- Mobile Portrait Reading Layout --- */
      .reading-exercise-page .split-container {
        flex-direction: column !important;
      }
      .reading-exercise-page .left-panel {
        width: 100% !important;
        height: 45vh !important;
        flex: 0 0 45vh !important;
        border-right: none !important;
        border-bottom: 2px solid var(--border-color);
        padding: 16px 16px 0 !important;
      }
      .reading-exercise-page .resizer {
        display: flex !important;
        align-items: center;
        justify-content: center;
        width: 100% !important;
        height: 18px !important;
        cursor: row-resize !important;
        background-color: #f8fafc;
        border-top: 1px solid #cbd5e1;
        border-bottom: 1px solid #cbd5e1;
        z-index: 50;
        touch-action: none !important;
      }
      .reading-exercise-page .resizer::after {
        content: '';
        width: 36px;
        height: 4px;
        background-color: #94a3b8;
        border-radius: 4px;
      }
      .reading-exercise-page .right-panel {
        width: 100% !important;
        height: 45vh !important;
        flex: 1 1 auto !important;
        padding: 16px 16px 32px !important;
        font-size: var(--passage-font-size, 1rem) !important;
      }
      
      .navigation-bar {
        display: flex !important;
        flex-direction: row;
        align-items: center;
        padding: 8px 12px;
        gap: 8px;
        flex-wrap: nowrap;
        background: #fff;
        height: auto;
        min-height: 48px;
        border-top: 1px solid #e2e8f0;
      }
      .nav-questions {
        flex: 1 1 auto;
        display: flex;
        flex-wrap: nowrap;
        overflow-x: auto;
        gap: 6px;
        padding-bottom: 2px;
      }
      .nav-dot {
        flex: 0 0 auto;
        width: 28px !important;
        height: 28px !important;
        font-size: 13px !important;
        min-width: 28px !important;
        padding: 0 !important;
      }
      .exercise-practice-page .btn-submit.module-submit-btn.mobile-nav-submit {
        flex: 0 0 auto;
        width: auto !important;
        min-width: 0 !important;
        padding: 6px 12px !important;
        font-size: 13px !important;
        border-radius: 6px !important;
        white-space: nowrap;
        margin: 0;
        box-shadow: none;
      }
      /* -------------------------------------- */

      .matching-info-question-row { grid-template-columns: 1fr; gap: 6px; }
      .note-summary-row { grid-template-columns: 1fr; gap: 4px; }
    }
    @media (max-width: 520px) {
      .prompt-content > p {
        max-width: 100%;
        overflow-wrap: anywhere;
      }
      .short-answer-row,
      .short-answer-row .short-answer-question {
        max-width: 100%;
      }
    }
    
    .header-nav-btn { display: inline-block; padding: 4px 12px; background: #f8fafc; color: #475569; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 13px; border: 1px solid #cbd5e1; transition: all 0.2s; visibility: hidden; }
    .header-nav-btn:hover { background: #f1f5f9; border-color: #94a3b8; color: #0f172a; }

    /* Flowchart Styling */
    .flowchart-option-bank {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(142px, 1fr));
      gap: 8px 12px;
      margin: 14px 0 18px;
      padding: 14px;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      background: #eff6ff;
    }
    .flowchart-option {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      min-width: 0;
      line-height: 1.35;
    }
    .flowchart-option-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      width: 26px;
      min-height: 24px;
      border-radius: 6px;
      background: #2563eb;
      color: #fff;
      font-weight: 900;
      font-size: 0.88rem;
    }
    .flowchart-option-text {
      min-width: 0;
      overflow-wrap: anywhere;
    }
    .flowchart-box {
      border: 2px solid #cbd5e1;
      border-radius: 8px;
      padding: 24px;
      background: #f8fafc;
      margin-top: 20px;
    }
    .flowchart-box p {
      text-align: center;
      margin: 0 0 10px;
      font-weight: 500;
      color: #1e293b;
    }
    .flowchart-arrow {
      text-align: center;
      font-size: 28px;
      font-weight: 900;
      color: #64748b;
      margin: 8px 0 14px;
    }
  </style>
</head>
<body>
  <header class="runner-header" style="position: relative;">
    <div class="runner-title-row">
      <a id="back-link" href="index.html" style="text-decoration: none; color: #495057; font-weight: bold;">Back</a>
      <h2 id="ex-title" style="margin: 0; font-size: 18px;">Loading...</h2>
    </div>
    <div class="runner-logo" style="position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 16px;">
      <a id="header-nav-prev" href="#" class="header-nav-btn" title="Previous Exercise">&laquo; Previous Exercise</a>
      <a href="../index.html" title="Go to IELTS Repo" style="display: block;">
        <img src="../assets/images/logo icon.png" alt="Saola" style="height: 32px; width: auto; display: block;">
      </a>
      <a id="header-nav-next" href="#" class="header-nav-btn" title="Next Exercise">Next Exercise &raquo;</a>
    </div>
    <div class="runner-actions">
      <button class="help-icon-btn" id="openHelpBtn" type="button" title="Help" hidden>?</button>
      <div id="timer" class="timer-box">00:00</div>
    </div>
  </header>

  <main class="runner-container">
    <audio id="audio-player" class="audio-player" controls style="display:none;"></audio>

    <div id="question-content" class="question-box">
      <p style="padding: 24px;">Loading questions...</p>
    </div>

    <button id="btn-submit" class="btn-submit">Submit Answers</button>

    <div id="result-section" class="result-section">
      <div class="score-card">
        <div class="score-title">Exercise completed.</div>
        <p>Review your answers below.</p>
      </div>

      <div class="follow-up-box">
        <div class="follow-up-title">Next Steps</div>
        <div class="follow-up-buttons" id="follow-up-container"></div>
      </div>
    </div>
  </main>

  <footer class="navigation-bar" id="navigationBar"></footer>

  <script>
    const runParams = new URLSearchParams(window.location.search);
    const runModule = runParams.get('module') || 'listening';
    document.getElementById('back-link').href = `index.html?module=${encodeURIComponent(runModule)}`;
  </script>
  <script src="../assets/js/saola-auth.js" data-widget="off"></script>
  <script src="../assets/js/exercise-runner.js"></script>
</body>
</html>
